<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.1/css/all.min.css" integrity="sha256-2XFplPlrFClt0bIdPgpz8H7ojnk10H69xRqd9+uTShA=" crossorigin="anonymous">

  <title>Mascotas</title>
</head>
<body>

<div style="padding-top: 100px"></div>

<div class="container">
  <h1>
    Ver Mascotas
  </h1>

  <h3>
    Sede: <span th:text="${sede}"></span>
  </h3>


  <table class="table">

    <thead>
    <tr>
      <th scope="col">Nombre</th>
      <th scope="col">Edad</th>
      <th scope="col">Genero</th>
      <th scope="col">Diagnostico</th>
      <th scope="col">Fecha Cita</th>
      <th scope="col">Numero Consultorio</th>

    </tr>
    </thead>

    <tbody>

    <tr th:each="mas : ${mascotaList}">
      <td th:text="${mas.getNombre()}"></td>
      <td th:text="${mas.getEdad()}"></td>
      <td th:text="${mas.getGenero()}"></td>
      <td th:text="${mas.getDiagnostico()}"></td>
      <td th:text="${mas.getFecha_cita()}"></td>
      <td th:text="${mas.getNumero_consultorio()}"></td>


    </tr>

    </tbody>

  </table>

</div>


</body>
</html>
