<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.1/css/all.min.css" integrity="sha256-2XFplPlrFClt0bIdPgpz8H7ojnk10H69xRqd9+uTShA=" crossorigin="anonymous">

    <title>Sistema Veterinaria</title>
</head>
<body>

<div style="padding-top: 100px"></div>

<div class="container">
    <h1>
        Sistema Farmacia
    </h1>

    <div class="container d-flex">
        <a href="/veterinaria/veterinarios"><button class="btn btn-success">Veterinarios</button></a>
        <a href="/veterinaria/mascotas" style="margin-left: 30px;"><button class="btn btn-success">Mascotas</button></a>
    </div>

    <table class="table">

        <thead>
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">Direccion</th>
                <th scope="col">Telefono</th>
                <th scope="col">Acciones</th>
            </tr>
        </thead>

        <tbody>

        <tr th:each="sede : ${listaSedes}">
            <td th:text="${sede.getNombre()}"></td>
            <td th:text="${sede.getDireccion()}"></td>
            <td th:text="${sede.getTelefono()}"></td>

            <td>
                <div>
                    <form th:action="@{/mostrar_veterinarios}" method="post">
                        <input type="hidden" name="idSede" th:value="${sede.getId()}">
                        <button class="btn btn-success" type="submit" style="margin-bottom: 30px;">Mostrar Veterinarios</button>
                    </form>

                    <form th:action="@{/mostrar_mascotas}" method="post">
                        <input type="hidden" name="idSede" th:value="${sede.getId()}">
                        <button class="btn btn-success" type="submit">Mostrar Mascotas</button>
                    </form>
                </div>
            </td>

        </tr>

        </tbody>

    </table>

</div>


</body>
</html>
